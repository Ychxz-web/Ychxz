<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Violet Music Player</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            font-family: 'Inter', sans-serif;
            background: url('https://img.sanishtech.com/u/46a88b87b59523d4b50edcc7c1b8524c.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        .overlay { position: absolute; inset: 0; background: rgba(76, 29, 149, 0.4); z-index: 1; }

        #intro { 
            position: fixed; inset: 0; z-index: 50;
            display: flex; align-items: center; justify-content: center;
            background: rgba(46, 16, 101, 0.4); backdrop-filter: blur(20px);
            transition: opacity 0.8s ease, visibility 0.8s; cursor: pointer;
        }
        .intro-card {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px; border-radius: 30px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .night { position: absolute; inset: 0; z-index: 2; pointer-events: none; }
        .star {
            position: absolute; height: 2px; background: white;
            border-radius: 50%; opacity: 0.6;
            animation: twinkle 3s infinite;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }

        #player-container {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            z-index: 10; width: 90%; max-width: 350px;
            background: rgba(76, 29, 149, 0.6); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px; border-radius: 25px;
            display: none; flex-direction: column; gap: 15px;
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div id="intro" onclick="startExperience()">
    <div class="intro-card">
        <h1 class="text-3xl font-semibold mb-2">Music Player</h1>
        <p class="text-violet-200 text-sm">Ketuk di mana saja untuk memulai</p>
    </div>
</div>

<div class="night" id="star-container"></div>

<div id="player-container">
    <div class="text-center">
        <div id="song-title" class="text-lg font-medium truncate">Memuat...</div>
        <div id="song-artist" class="text-violet-300 text-sm">Harap tunggu</div>
    </div>
    <input type="range" id="progress-bar" class="w-full h-1 bg-violet-300/50 rounded-lg appearance-none cursor-pointer" value="0">
    <div class="flex justify-center items-center gap-8">
        <button onclick="prevSong()" class="text-white hover:text-violet-300">⏮</button>
        <button onclick="togglePlay()" id="play-btn" class="text-4xl hover:scale-110 transition">▶</button>
        <button onclick="nextSong()" class="text-white hover:text-violet-300">⏭</button>
    </div>
</div>

<div id="yt-player" class="hidden"></div>

<script>
    const playlist = [
        { title: "Space Song", artist: "Beach House", id: "0wtuCRt5I6g" },
        { title: "Myth", artist: "Beach House", id: "5gT1T303_P4" },
        { title: "When You Sleep", artist: "MBV", id: "l9bTWAgYCFk" },
        { title: "Sunsetz", artist: "Cigarettes After Sex", id: "biwWsP2BuRM" },
        { title: "Apocalypse", artist: "Cigarettes After Sex", id: "sT98Pj0Mz0U" },
        { title: "Always Forever", artist: "Cults", id: "rxW0oB8mOxc" },
        { title: "Seasons", artist: "wave to earth", id: "x4x_P_I1jAE" },
        { title: "Robbers", artist: "The 1975", id: "4H7sW_cO05M" },
        { title: "Somebody Else", artist: "The 1975", id: "BQMpCWu_A0M" },
        { title: "End of Beginning", artist: "Djo", id: "1tQ1p817Gxk" },
        { title: "Sofia", artist: "Clairo", id: "L9l8zCOwEII" },
        { title: "Kyoto", artist: "Phoebe Bridgers", id: "Tw0zYd0eIlk" },
        { title: "August", artist: "Taylor Swift", id: "nn_0zpx40_4" }
    ];

    let player, currentIdx = 0;

    function startExperience() {
        document.getElementById('intro').style.opacity = '0';
        setTimeout(() => document.getElementById('intro').remove(), 800);
        document.getElementById('player-container').style.display = 'flex';
        generateStars();
        initPlayer();
    }

    function generateStars() {
        const cont = document.getElementById('star-container');
        for(let i=0; i<30; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.width = Math.random() * 3 + 'px';
            s.style.height = s.style.width;
            cont.appendChild(s);
        }
    }

    function initPlayer() {
        player = new YT.Player('yt-player', {
            videoId: playlist[currentIdx].id,
            events: {
                'onReady': (e) => e.target.playVideo(),
                'onStateChange': (e) => {
                    if(e.data == 1) document.getElementById('play-btn').innerText = '⏸';
                    else document.getElementById('play-btn').innerText = '▶';
                    if(e.data == 0) nextSong();
                },
                'onError': () => nextSong() // Skip otomatis jika diblokir
            }
        });
        document.getElementById('song-title').innerText = playlist[currentIdx].title;
        document.getElementById('song-artist').innerText = playlist[currentIdx].artist;
    }

    function togglePlay() {
        if(player.getPlayerState() == 1) player.pauseVideo();
        else player.playVideo();
    }

    function nextSong() {
        currentIdx = (currentIdx + 1) % playlist.length;
        player.loadVideoById(playlist[currentIdx].id);
        document.getElementById('song-title').innerText = playlist[currentIdx].title;
        document.getElementById('song-artist').innerText = playlist[currentIdx].artist;
    }

    function prevSong() {
        currentIdx = (currentIdx - 1 + playlist.length) % playlist.length;
        player.loadVideoById(playlist[currentIdx].id);
        document.getElementById('song-title').innerText = playlist[currentIdx].title;
        document.getElementById('song-artist').innerText = playlist[currentIdx].artist;
    }
</script>
</body>
</html>
