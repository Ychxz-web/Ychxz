<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>By Yaezz</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        #intro { position: fixed; inset: 0; background: #000; color: white; display: flex; align-items: center; justify-content: center; z-index: 999; cursor: pointer; }
        #bg { position: fixed; inset: 0; background-image: url('https://img.sanishtech.com/u/46a88b87b59523d4b50edcc7c1b8524c.jpg'); background-size: cover; background-position: center; display: none; }
        .star { position: absolute; width: 40px; height: 40px; background-image: url('https://w7.pngwing.com/pngs/883/837/png-transparent-yellow-star-illustration-falling-pixel-star-pro-pixel-art-star-thumbnail.png'); background-size: contain; filter: drop-shadow(0 0 15px white); z-index: 1; pointer-events: none; }
        #name { position: absolute; top: 20px; right: 30px; color: white; font-size: 24px; font-weight: bold; z-index: 2; }
        #player { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 20px; border-radius: 15px; color: white; width: 320px; text-align: center; z-index: 10; }
        button { cursor: pointer; padding: 5px 15px; margin: 5px; }
    </style>
</head>
<body>

<div id="intro"><h1>Click Anywhere</h1></div>
<div id="bg"></div>
<div id="name">By Yaezz</div>

<div id="player">
    <div id="song-title">Siap Memutar...</div>
    <div id="timer">0:00 / 0:00</div>
    <button onclick="prevSong()">Prev</button>
    <button onclick="nextSong()">Next</button>
</div>

<div id="youtube-player" style="display:none"></div>

<script>
    const songIds = [
        "J3x4o4bM1wM", "q8NjtHj2x5c", "IIRYYEvd7SY", "Vq6wz4695sM", "r9S7J1gJ8M4", "Qk32G_i6_6E", "219r9Jd_M7Y", "a6uRk1j9cM0", "7p8l9k2j3h4", "o7r8t9y0u1i", 
        "L7_S326S13M", "8y85348954", "s569348543", "4534853489", "5438954343", "5438543854", "5438543854", "5438543854", "5438543854", "5438543854",
        "5438543854", "5438543854", "5438543854", "5438543854", "5438543854", "5438543854", "5438543854", "5438543854", "5438543854", "5438543854",
        "5438543854", "5438543854", "5438543854", "5438543854", "5438543854", "5438543854", "5438543854", "5438543854", "5438543854", "5438543854"
    ];
    let player, currentIdx = 0;

    document.getElementById('intro').onclick = () => {
        document.getElementById('intro').style.display = 'none';
        document.getElementById('bg').style.display = 'block';
        initPlayer();
        setInterval(spawnStar, 2000);
    };

    function initPlayer() {
        player = new YT.Player('youtube-player', {
            videoId: songIds[currentIdx],
            events: { 'onReady': (e) => e.target.playVideo() }
        });
    }

    function nextSong() { currentIdx = (currentIdx + 1) % songIds.length; player.loadVideoById(songIds[currentIdx]); }
    function prevSong() { currentIdx = (currentIdx - 1 + songIds.length) % songIds.length; player.loadVideoById(songIds[currentIdx]); }

    function spawnStar() {
        const star = document.createElement('div');
        star.className = 'star';
        const startX = Math.random() * window.innerWidth;
        star.style.left = startX + 'px'; star.style.top = '-50px';
        document.body.appendChild(star);
        let pos = -50;
        let anim = setInterval(() => {
            pos += 3; star.style.top = pos + 'px'; star.style.left = (startX + (pos/5)) + 'px';
            if (pos > window.innerHeight) { star.remove(); clearInterval(anim); }
        }, 20);
    }
</script>
</body>
</html>
