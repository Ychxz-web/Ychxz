<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>By Yaezz - Violet Edition</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100vh; overflow: hidden; background: #05010a; font-family: 'Inter', sans-serif; color: #fff; user-select: none; }

        /* Intro Berkelas */
        #intro { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at center, #1e0a3c, #05010a);
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 999; cursor: pointer; transition: opacity 1.5s ease;
            backdrop-filter: blur(10px);
        }
        #intro h1 { font-size: 3rem; font-weight: 200; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 20px; }
        #intro p { 
            font-size: 0.9rem; font-weight: 300; color: #a78bfa; letter-spacing: 4px; 
            text-transform: lowercase; border: 1px solid #a78bfa; padding: 10px 20px; transition: all 0.4s ease; 
        }
        #intro:hover p { background: #a78bfa; color: #1e0a3c; box-shadow: 0 0 20px rgba(167, 139, 250, 0.5); }

        /* Player Styling */
        #player { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); 
            background: rgba(15, 5, 25, 0.7); backdrop-filter: blur(20px);
            padding: 25px; border-radius: 24px; width: 90%; max-width: 400px; 
            border: 1px solid rgba(167, 139, 250, 0.3); z-index: 10; display: none; flex-direction: column; gap: 15px;
        }
        .song-info { text-align: center; }
        #song-title { font-size: 18px; font-weight: 600; margin-bottom: 5px; }
        #song-artist { font-size: 14px; color: #d8b4fe; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 25px; }
        .btn { background: none; border: none; color: #d8b4fe; cursor: pointer; transition: 0.2s; }
        .btn:hover { color: #fff; }
        .btn-main { width: 55px; height: 55px; border-radius: 50%; background: #e9d5ff; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="intro" onclick="startExperience()">
    <h1>VIOLET EDITION</h1>
    <p>enter the atmosphere</p>
</div>

<div id="player">
    <div class="song-info">
        <div id="song-title">Ready</div>
        <div id="song-artist">Click to play</div>
    </div>
    <div class="controls">
        <button class="btn" onclick="prevSong()">Prev</button>
        <button class="btn-main" onclick="togglePlay()">Play</button>
        <button class="btn" onclick="nextSong()">Next</button>
    </div>
</div>

<div id="yt-container"><div id="yt-player"></div></div>

<script>
    const playlist = [
        { title: "Space Song", artist: "Beach House", id: "Hvgu7bro3AY" },
        { title: "Seasons", artist: "wave to earth", id: "x4x_P_I1jAE" }
    ];

    let player, currentIdx = 0;

    function startExperience() {
        document.getElementById('intro').style.opacity = '0';
        setTimeout(() => document.getElementById('intro').style.display = 'none', 1500);
        document.getElementById('player').style.display = 'flex';
        
        player = new YT.Player('yt-player', {
            videoId: playlist[currentIdx].id,
            events: { 'onReady': (e) => e.target.playVideo() }
        });
    }

    function togglePlay() {
        const state = player.getPlayerState();
        state === 1 ? player.pauseVideo() : player.playVideo();
    }

    function nextSong() {
        currentIdx = (currentIdx + 1) % playlist.length;
        player.loadVideoById(playlist[currentIdx].id);
        updateUI();
    }

    function prevSong() {
        currentIdx = (currentIdx - 1 + playlist.length) % playlist.length;
        player.loadVideoById(playlist[currentIdx].id);
        updateUI();
    }

    function updateUI() {
        document.getElementById('song-title').innerText = playlist[currentIdx].title;
        document.getElementById('song-artist').innerText = playlist[currentIdx].artist;
    }
</script>
</body>
</html>
