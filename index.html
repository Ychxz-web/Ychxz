<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About You - Yaexz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-image: url('https://img.sanishtech.com/u/4480232563112b1a41e5c850b4ef4159.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #e4e4e7;
            margin: 0;
            overflow-x: hidden;
        }
        .serif { font-family: 'Playfair Display', serif; }

        /* Animasi & Efek */
        .animate-fade-in { animation: fadeInAnimation 1.5s ease-out forwards; }
        @keyframes fadeInAnimation {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-spin-slow { animation: spin 10s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* Bintang Jatuh */
        .stars-container { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        .star { position: absolute; width: 2px; height: 2px; background: white; opacity: 0; }
        @keyframes shooting-star {
            0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
            10% { opacity: 1; }
            20% { transform: translateY(300px) translateX(300px) scale(1.5); opacity: 0; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative">

    <div class="fixed inset-0 bg-black/60 z-0"></div>
    <div id="stars" class="stars-container"></div>

    <!-- Overlay Utama -->
    <div id="start-overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black/90 backdrop-blur-md cursor-pointer transition-opacity duration-1000">
        <p class="serif text-4xl md:text-6xl italic text-white/90 mb-6 tracking-wider">About You</p>
        <p class="text-xs text-zinc-400 tracking-[0.3em] uppercase animate-pulse">Click anywhere to play</p>
    </div>

    <!-- YouTube & Main -->
    <div id="ytplayer" class="hidden"></div>
    <main class="animate-fade-in opacity-0 w-full max-w-3xl px-6 py-12 flex flex-col items-center text-center space-y-16 z-10">
        <div class="space-y-3">
            <h1 class="serif text-5xl md:text-7xl font-bold tracking-tight text-white drop-shadow-xl">About You</h1>
            <p class="text-lg md:text-xl text-zinc-400 tracking-widest uppercase text-sm">yaexz</p>
        </div>

        <div id="record-container" class="relative w-56 h-56 md:w-72 md:h-72 rounded-full bg-zinc-900 border-2 border-zinc-700 shadow-[0_0_50px_rgba(0,0,0,0.5)] flex items-center justify-center transition-transform duration-700">
            <div class="w-20 h-20 bg-zinc-800 rounded-full border border-zinc-700"></div>
        </div>

        <div id="ai-section" class="hidden opacity-0 transition-opacity duration-1000 w-full bg-white/5 p-8 rounded-2xl border border-white/10 backdrop-blur-md">
            <h2 class="serif text-2xl text-white mb-6">Explore the Atmosphere</h2>
            <div id="ai-output-container" class="text-zinc-300 italic"></div>
        </div>
    </main>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        
        // Inisialisasi Bintang
        function createStar() {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.top = Math.random() * 50 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.animation = `shooting-star ${Math.random() * 3 + 3}s linear infinite`;
            document.getElementById('stars').appendChild(star);
        }
        for(let i=0; i<8; i++) createStar();

        // YouTube Player
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytplayer', {
                videoId: '28Lj4qt3lCc',
                events: { 'onReady': onPlayerReady }
            });
        }

        function onPlayerReady() {
            const overlay = document.getElementById('start-overlay');
            overlay.addEventListener('click', () => {
                player.playVideo();
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 1000);
                document.getElementById('ai-section').classList.remove('hidden');
                setTimeout(() => document.getElementById('ai-section').classList.remove('opacity-0'), 100);
            });
        }
    </script>
</body>
</html>
