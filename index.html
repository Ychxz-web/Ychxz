<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About You - Yaexz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: url('https://img.sanishtech.com/u/4480232563112b1a41e5c850b4ef4159.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* Pixel Star - Gaya Pixel Art */
        .stars-container { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
        .star { 
            position: absolute; 
            width: 4px; height: 4px; 
            background: #fff; 
            box-shadow: -4px 0 0 #fff, -8px 0 0 rgba(255,255,255,0.6), -12px 0 0 rgba(255,255,255,0.3);
            opacity: 0;
        }
        
        /* Animasi jatuh lebih vertikal */
        @keyframes shooting-star-pixel {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            50% { transform: translateY(600px) translateX(150px); opacity: 0; }
            100% { opacity: 0; }
        }

        #start-overlay { z-index: 100; transition: opacity 0.8s ease; cursor: pointer; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">

    <div class="fixed inset-0 bg-black/60 z-0"></div>
    <div id="stars" class="stars-container"></div>

    <div id="start-overlay" class="fixed inset-0 flex flex-col items-center justify-center bg-black/80 backdrop-blur-sm">
        <p class="text-5xl italic text-white/90 mb-6 font-serif">About You</p>
        <p class="text-xs text-zinc-400 uppercase tracking-[0.3em] animate-pulse">Klik di mana saja untuk mulai</p>
    </div>

    <main class="text-center z-20 text-white animate-pulse">
        <h1 class="text-6xl font-bold mb-4 font-serif">About You</h1>
        <p class="text-zinc-400 uppercase tracking-widest">yaexz</p>
    </main>

    <div id="ytplayer" class="hidden"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;

        // Membuat bintang pixel
        function createPixelStar() {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.top = Math.random() * -10 + '%';
            s.style.left = Math.random() * 100 + '%';
            s.style.animation = `shooting-star-pixel ${Math.random() * 3 + 3}s linear infinite`;
            document.getElementById('stars').appendChild(s);
        }
        for(let i=0; i<12; i++) createPixelStar();

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytplayer', {
                videoId: '28Lj4qt3lCc',
                events: { 'onReady': initClick }
            });
        }

        function initClick() {
            const overlay = document.getElementById('start-overlay');
            overlay.addEventListener('click', () => {
                player.playVideo();
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 800);
            });
        }
    </script>
</body>
</html>
