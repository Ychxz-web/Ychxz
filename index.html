<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>By Yaezz - Violet Edition</title>
    <!-- Memuat YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100vh; overflow: hidden; 
            /* Mengembalikan background asli yang dikirimkan user */
            background: radial-gradient(ellipse at bottom, #0D1E31, #111);
            font-family: 'Inter', sans-serif; 
            color: #fff; user-select: none;
        }

        /* Tampilan Intro yang Baru & Jauh Lebih Bagus */
        #intro { 
            position: fixed; inset: 0; 
            background: radial-gradient(ellipse at bottom, #0D1E31, #05010a);
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 999; cursor: pointer; transition: opacity 1s ease, visibility 1s;
        }
        #intro h1 {
            font-size: 2.5rem; font-weight: 700; letter-spacing: 4px; text-transform: uppercase;
            color: #fff; text-shadow: 0 0 20px rgba(95, 145, 255, 0.8);
            margin-bottom: 10px; z-index: 2;
        }
        #intro p {
            font-size: 1rem; color: #a78bfa; letter-spacing: 1px; z-index: 2;
            animation: blink 2s infinite;
        }
        .pulse-ring {
            position: absolute; width: 150px; height: 150px;
            border-radius: 50%; border: 2px solid #5F91FF;
            animation: pulsing 2.5s infinite ease-out; z-index: 1;
        }

        @keyframes pulsing {
            0% { transform: scale(0.8); opacity: 1; box-shadow: 0 0 0 0 rgba(95, 145, 255, 0.7); }
            100% { transform: scale(2.5); opacity: 0; box-shadow: 0 0 0 30px rgba(95, 145, 255, 0); }
        }
        @keyframes blink { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* Mengembalikan CSS Bintang Persis Sesuai Permintaan User */
        .night {
            position: absolute; width: 200%; height: 200%;
            top: -50%; left: -50%;
            transform: rotateZ(40deg);
            pointer-events: none; /* Tidak bisa diklik */
            z-index: 1; display: none;
        }

        .star {
            position: absolute; height: 4px;
            background: linear-gradient(-45deg, #5F91FF, rgba(0, 0, 255, 0));
            border-radius: 999px;
            filter: drop-shadow(0 0 6px #699BFF);
            animation: tail 3s ease-in-out infinite, falling 3s ease-in-out infinite;
            /* Delay custom agar dari JS jatuhnya acak, bukan barengan */
            animation-delay: var(--delay, 0s); 
        }

        .star::before, .star::after {
            content: ''; position: absolute;
            top: calc(50% - 2px); right: 0; height: 4px;
            background: linear-gradient(-45deg, rgba(0, 0, 255, 0), #5F91FF, rgba(0, 0, 255, 0));
            border-radius: 100%;
            transform: translateX(50%) rotateZ(45deg);
            animation: shining 3s ease-in-out infinite;
            animation-delay: var(--delay, 0s);
        }

        .star::after {
            transform: translateX(50%) rotateZ(-45deg);
        }

        @keyframes tail { 0% { width: 0; } 30% { width: 100px; } 100% { width: 0; } }
        @keyframes falling { 0% { transform: translateX(0); } 100% { transform: translateX(300px); } }
        @keyframes shining { 0% { width: 0; } 50% { width: 30px; } 100% { width: 0; } }

        /* Tema Player (Ungu / Violet) */
        #player { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); 
            background: rgba(30, 10, 60, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 25px; border-radius: 24px; width: 90%; max-width: 400px; 
            border: 1px solid rgba(167, 139, 250, 0.2);
            z-index: 10; display: none; flex-direction: column; gap: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(139, 92, 246, 0.1);
        }

        .song-info { text-align: center; }
        #song-title { font-size: 18px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; color: #fff;}
        #song-artist { font-size: 14px; color: #d8b4fe; }

        .progress-container { display: flex; align-items: center; gap: 10px; font-size: 12px; color: #c4b5fd; }
        #progress-bar { 
            flex-grow: 1; -webkit-appearance: none; height: 5px; background: rgba(167, 139, 250, 0.3); 
            border-radius: 5px; outline: none; cursor: pointer;
        }
        #progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 14px; height: 14px;
            border-radius: 50%; background: #e9d5ff; cursor: pointer; transition: transform 0.1s;
        }
        #progress-bar::-webkit-slider-thumb:hover { transform: scale(1.3); background: #fff;}

        .controls { display: flex; justify-content: center; align-items: center; gap: 25px; }
        .btn { background: none; border: none; color: #d8b4fe; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .btn:hover { color: #fff; transform: scale(1.1); }
        .btn svg { width: 24px; height: 24px; fill: currentColor; }
        
        .btn-main { width: 55px; height: 55px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; border: 2px solid transparent; }
        .btn-main:hover { transform: scale(1.05); }
        
        .mode-play { background: #e9d5ff; }
        .mode-play svg { fill: #2e1065; width: 22px; height: 22px; }

        .mode-pause { background: transparent; border-color: rgba(233, 213, 255, 0.5); }
        .mode-pause svg { fill: #e9d5ff; width: 22px; height: 22px; }

        #yt-container { position: absolute; top: 0; left: 0; width: 1px; height: 1px; opacity: 0; pointer-events: none; z-index: -999; }
    </style>
</head>
<body>

<div id="intro">
    <div class="pulse-ring"></div>
    <h1>Start Music</h1>
    <p>Click anywhere to explore</p>
</div>

<div class="night">
    <!-- Bintang akan di-generate via JavaScript di sini agar acak -->
</div>

<div id="player">
    <div class="song-info">
        <div id="song-title">Memuat Player...</div>
        <div id="song-artist">Mohon tunggu</div>
    </div>
    
    <div class="progress-container">
        <span id="time-current">0:00</span>
        <input type="range" id="progress-bar" value="0" min="0" max="100" step="0.1">
        <span id="time-duration">0:00</span>
    </div>

    <div class="controls">
        <button class="btn" onclick="prevSong()"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
        <button id="main-btn" class="btn-main mode-play" onclick="togglePlay()">
            <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="btn" onclick="nextSong()"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
    </div>
</div>

<div id="yt-container"><div id="yt-player"></div></div>

<script>
    // Playlist dengan beberapa ID yang diperbarui (Video Lirik / Reupload Audio)
    const playlist = [
        { title: "Space Song", artist: "Beach House", id: "Hvgu7bro3AY" }, // Re-upload / Audio
        { title: "Myth", artist: "Beach House", id: "FvqNdJJMqaA" },
        { title: "When You Sleep", artist: "My Bloody Valentine", id: "l9bTWAgYCFk" },
        { title: "Cherry-coloured Funk", artist: "Cocteau Twins", id: "WQNkEaA0g2s" },
        { title: "Sunsetz", artist: "Cigarettes After Sex", id: "biwWsP2BuRM" }, // Re-upload / Lyric
        { title: "Cry", artist: "Cigarettes After Sex", id: "2T0q1P_-IQQ" },
        { title: "alife", artist: "Slowdive", id: "GkXG-Z11rE8" },
        { title: "Sugar for the Pill", artist: "Slowdive", id: "BxwPBwqm6Zs" },
        { title: "Always Forever", artist: "Cults", id: "rxW0oB8mOxc" },
        { title: "seasons", artist: "wave to earth", id: "x4x_P_I1jAE" },
        { title: "Robbers", artist: "The 1975", id: "F8yNA9ortNw" }, // Re-upload / Lyric
        { title: "Fallingforyou", artist: "The 1975", id: "iF2s_wBwKqI" },
        { title: "Medicine", artist: "The 1975", id: "8b2O0EaDk4M" },
        { title: "Lostmyhead", artist: "The 1975", id: "2o_BngS62wA" },
        { title: "Me", artist: "The 1975", id: "HkQpBIfn91U" },
        { title: "You", artist: "The 1975", id: "N6AImt2mYng" },
        { title: "Haunt // Bed", artist: "The 1975", id: "5Vz1yI2O0E8" },
        { title: "Somebody Else", artist: "The 1975", id: "BQMpCWu_A0M" },
        { title: "End of Beginning", artist: "Djo", id: "1tQ1p817Gxk" },
        { title: "Wild Heart", artist: "Bleachers", id: "1i1B-K30LDU" },
        { title: "Chinatown", artist: "Bleachers (feat. Bruce Springsteen)", id: "l2zY140vBEY" },
        { title: "Transatlanticism", artist: "Death Cab for Cutie", id: "qNqQC7R_Me4" },
        { title: "Heroes", artist: "David Bowie", id: "lXgkuM2NhYI" },
        { title: "Shot At The Night", artist: "The Killers", id: "X4YK-DEkvcw" },
        { title: "Wait", artist: "M83", id: "lAwYodrBr2Q" },
        { title: "23", artist: "Jimmy Eat World", id: "3gA3z92G1Hk" },
        { title: "Existentialism on Prom Night", artist: "Straylight Run", id: "T_KzB0j2n5w" },
        { title: "Bitter Sweet Symphony", artist: "The Verve", id: "1lyu1KKwC74" },
        { title: "Crush", artist: "Ethel Cain", id: "t1Lz9530kF8" },
        { title: "Thoroughfare", artist: "Ethel Cain", id: "wX-y00nO22w" },
        { title: "American Teenager", artist: "Ethel Cain", id: "GkXG-Z11rE8" },
        { title: "Sofia", artist: "Clairo", id: "L9l8zCOwEII" },
        { title: "Bags", artist: "Clairo", id: "L9l8zCOwEII" },
        { title: "Kyoto", artist: "Phoebe Bridgers", id: "Tw0zYd0eIlk" },
        { title: "Chinese Satellite", artist: "Phoebe Bridgers", id: "Wz_dD7n1p3k" },
        { title: "Scott Street", artist: "Phoebe Bridgers", id: "8l836N_m58E" },
        { title: "Did you know that there's a tunnel under Ocean Blvd", artist: "Lana Del Rey", id: "1yWbI2x0b00" },
        { title: "Venice Bitch", artist: "Lana Del Rey", id: "VDmhiqDhhX8" },
        { title: "Brooklyn Baby", artist: "Lana Del Rey", id: "T5xcnjAG8pE" },
        { title: "Come Inside Of My Heart", artist: "IV OF SPADES", id: "vV23s8i0h2k" },
        { title: "mirrorball", artist: "Taylor Swift", id: "AWeq-1h9N-k" },
        { title: "You Are In Love", artist: "Taylor Swift", id: "UPEiK_10bWc" },
        { title: "august", artist: "Taylor Swift", id: "9oRTVVIOPPA" }, // Re-upload / Lyric
        { title: "Guilty As Sin?", artist: "Taylor Swift", id: "NnF2H5Q8i7A" },
        { title: "Strawberries & Cigarettes", artist: "Troye Sivan", id: "XzW5M-GqAok" },
        { title: "The Scientist", artist: "Coldplay", id: "RB-RcX5DS5A" },
        { title: "Fix You", artist: "Coldplay", id: "k4V3Mo61fJM" },
        { title: "Everytime", artist: "Britney Spears", id: "8YzabSdk7ZA" }
    ];

    let player;
    let currentIdx = 0;
    let isPlaying = false;
    let isDragging = false;
    let errorTimeout;

    document.getElementById('intro').onclick = () => {
        document.getElementById('intro').style.opacity = '0';
        document.getElementById('intro').style.visibility = 'hidden';
        
        setTimeout(() => { document.getElementById('intro').style.display = 'none'; }, 1000);

        document.querySelector('.night').style.display = 'block';
        document.getElementById('player').style.display = 'flex';
        
        generateStars();
        initYouTubePlayer();
    };

    function generateStars() {
        const night = document.querySelector('.night');
        night.innerHTML = '';
        // Menyebarkan 15 bintang secara acak agar persis seperti CSS user tetapi tidak menumpuk
        for(let i = 0; i < 15; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = (Math.random() * 80 + 10) + '%';
            star.style.top = (Math.random() * 80 + 10) + '%';
            star.style.setProperty('--delay', (Math.random() * 5) + 's');
            night.appendChild(star);
        }
    }

    function initYouTubePlayer() {
        player = new YT.Player('yt-player', {
            height: '10', width: '10', 
            videoId: playlist[currentIdx].id,
            playerVars: { 'autoplay': 1, 'controls': 0, 'disablekb': 1, 'origin': window.location.origin },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange,
                'onError': onPlayerError
            }
        });
    }

    function onPlayerReady(event) {
        updateSongInfo();
        event.target.playVideo();
        startProgressTracker();
    }

    function onPlayerStateChange(event) {
        clearTimeout(errorTimeout);
        document.getElementById('song-artist').style.color = '#d8b4fe'; 

        const mainBtn = document.getElementById('main-btn');
        if (event.data === YT.PlayerState.PLAYING) {
            isPlaying = true;
            document.getElementById('icon-play').style.display = 'none';
            document.getElementById('icon-pause').style.display = 'block';
            mainBtn.classList.remove('mode-play'); mainBtn.classList.add('mode-pause');
        } else if (event.data === YT.PlayerState.PAUSED) {
            isPlaying = false;
            document.getElementById('icon-play').style.display = 'block';
            document.getElementById('icon-pause').style.display = 'none';
            mainBtn.classList.remove('mode-pause'); mainBtn.classList.add('mode-play');
        } else if (event.data === YT.PlayerState.ENDED) {
            nextSong();
        }
    }

    function onPlayerError(event) {
        document.getElementById('song-title').innerText = playlist[currentIdx].title;
        // Waktu skip dipercepat jadi 1.5 detik agar pengguna tidak menunggu lama jika lagu terblokir
        document.getElementById('song-artist').innerText = "Diblokir YT. Melewati otomatis...";
        document.getElementById('song-artist').style.color = '#ef4444'; 
        errorTimeout = setTimeout(() => { nextSong(); }, 1500); 
    }

    function updateSongInfo() {
        document.getElementById('song-title').innerText = playlist[currentIdx].title;
        document.getElementById('song-artist').innerText = playlist[currentIdx].artist;
    }

    function togglePlay() {
        if (!player || !player.getPlayerState) return;
        if (isPlaying) player.pauseVideo(); else player.playVideo();
    }

    function nextSong() {
        clearTimeout(errorTimeout);
        currentIdx = (currentIdx + 1) % playlist.length;
        if (player && player.loadVideoById) player.loadVideoById(playlist[currentIdx].id);
        updateSongInfo();
    }

    function prevSong() {
        clearTimeout(errorTimeout);
        currentIdx = (currentIdx - 1 + playlist.length) % playlist.length;
        if (player && player.loadVideoById) player.loadVideoById(playlist[currentIdx].id);
        updateSongInfo();
    }

    function startProgressTracker() {
        const progressBar = document.getElementById('progress-bar');
        const timeCurrent = document.getElementById('time-current');
        const timeDuration = document.getElementById('time-duration');

        setInterval(() => {
            if (player && player.getPlayerState && player.getPlayerState() === YT.PlayerState.PLAYING && !isDragging) {
                const current = player.getCurrentTime();
                const duration = player.getDuration();
                if (duration > 0) {
                    progressBar.value = (current / duration) * 100;
                    timeCurrent.innerText = formatTime(current);
                    timeDuration.innerText = formatTime(duration);
                }
            }
        }, 500);

        progressBar.addEventListener('input', (e) => {
            isDragging = true;
            if (player && player.getDuration) {
                const draftTime = (e.target.value / 100) * player.getDuration();
                timeCurrent.innerText = formatTime(draftTime);
            }
        });

        progressBar.addEventListener('change', (e) => {
            if (player && player.seekTo) {
                const duration = player.getDuration();
                player.seekTo((e.target.value / 100) * duration, true);
            }
            isDragging = false; 
        });
    }

    function formatTime(sec) {
        if (!sec || isNaN(sec)) return "0:00";
        const m = Math.floor(sec / 60); const s = Math.floor(sec % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }
</script>
</body>
</html>
