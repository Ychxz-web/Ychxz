<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About You - Yaexz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-image: url('https://img.sanishtech.com/u/4480232563112b1a41e5c850b4ef4159.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #e4e4e7;
            overflow-x: hidden;
        }
        .serif { font-family: 'Playfair Display', serif; }
        
        /* Animasi Fade In */
        .animate-fade-in { animation: fadeInAnimation 1.5s ease-out forwards; }
        @keyframes fadeInAnimation {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-spin-slow { animation: spin 10s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .fade-out { opacity: 0; transition: opacity 1s ease-in-out; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative">

    <!-- Dark Overlay agar teks terbaca -->
    <div class="fixed inset-0 bg-black/60 z-0"></div>

    <!-- Overlay Start -->
    <div id="start-overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black/90 backdrop-blur-md cursor-pointer transition-opacity duration-1000">
        <p class="serif text-4xl md:text-6xl italic text-white/90 mb-6 tracking-wider">About You</p>
        <p class="text-xs text-zinc-400 tracking-[0.3em] uppercase animate-pulse">Click anywhere to play</p>
    </div>

    <div id="ytplayer" class="hidden"></div>

    <main class="animate-fade-in opacity-0 w-full max-w-3xl px-6 py-12 flex flex-col items-center text-center space-y-16 z-10">
        <div class="space-y-3">
            <h1 class="serif text-5xl md:text-7xl font-bold tracking-tight text-white drop-shadow-xl">About You</h1>
            <p class="text-lg md:text-xl text-zinc-400 tracking-widest uppercase text-sm">yaexz</p>
        </div>

        <div id="record-container" class="relative w-56 h-56 md:w-72 md:h-72 rounded-full bg-zinc-900 border-2 border-zinc-700 shadow-[0_0_50px_rgba(0,0,0,0.5)] flex items-center justify-center overflow-hidden transition-transform duration-700">
            <div class="absolute inset-2 rounded-full border border-zinc-800/60"></div>
            <div class="w-20 h-20 bg-zinc-800 rounded-full flex items-center justify-center shadow-inner border border-zinc-700">
                <div class="w-4 h-4 bg-zinc-950 rounded-full shadow-inner"></div>
            </div>
        </div>

        <button id="play-pause-btn" class="text-zinc-500 hover:text-white transition-colors hidden mt-4">
            <svg id="icon-play" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            <svg id="icon-pause" class="hidden h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        </button>

        <!-- AI Section (Tambahkan jika belum ada) -->
        <div id="ai-section" class="hidden opacity-0 transition-opacity duration-1000 w-full bg-white/5 p-8 rounded-2xl border border-white/10 backdrop-blur-md">
            <h2 class="serif text-2xl text-white mb-6">Explore the Atmosphere</h2>
            <div id="ai-output-container" class="text-zinc-300 leading-relaxed italic"></div>
        </div>
    </main>

    <script>
        // Script YouTube dan Gemini Anda di sini...
        // Pastikan fungsi onPlayerReady dan onPlayerStateChange sesuai dengan struktur di atas.
    </script>
</body>
</html>
